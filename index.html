<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>دردشة ذكاء اصطناعي</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: Tahoma, Arial, sans-serif;
  background: #eef2f7;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  padding: 16px;
}
.wrap {
  width: 100%;
  max-width: 680px;
  display: flex;
  flex-direction: column;
  height: 92vh;
  border-radius: 14px;
  overflow: hidden;
  box-shadow: 0 4px 24px rgba(0,0,0,.12);
}

/* ── Header ── */
.hdr {
  background: #1e293b;
  color: #fff;
  padding: 14px 18px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.hdr-icon { font-size: 24px; }
.hdr-title { font-size: 15px; font-weight: bold; }
.hdr-sub   { font-size: 11px; opacity: .65; margin-top: 2px; }

/* ── Key bar ── */
.keybar {
  background: #fff;
  border-bottom: 1.5px solid #e2e8f0;
  padding: 9px 14px;
  display: flex;
  gap: 8px;
  align-items: center;
}
.keybar input {
  flex: 1; padding: 7px 10px;
  border: 1.5px solid #cbd5e1;
  border-radius: 7px;
  font-size: 12px;
  font-family: monospace;
  direction: ltr;
}
.keybar input:focus { outline: none; border-color: #6366f1; }
.keybar select {
  padding: 7px 8px;
  border: 1.5px solid #cbd5e1;
  border-radius: 7px;
  font-size: 12px;
  font-family: inherit;
  background: #f8fafc;
  cursor: pointer;
}
.keybar select:focus { outline: none; border-color: #6366f1; }
.btn-save {
  background: #6366f1; color: #fff;
  border: none; border-radius: 7px;
  padding: 7px 14px; font-size: 12px;
  cursor: pointer; font-family: inherit;
  white-space: nowrap;
}
.btn-save:hover { background: #4f46e5; }
.key-ok { font-size: 11px; color: #16a34a; white-space: nowrap; }

/* ── Messages ── */
.msgs {
  flex: 1;
  overflow-y: auto;
  padding: 16px;
  background: #f8fafc;
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.msg { display: flex; gap: 8px; align-items: flex-end; max-width: 88%; }
.msg.user { align-self: flex-end; flex-direction: row-reverse; }
.msg.bot  { align-self: flex-start; }
.av {
  width: 30px; height: 30px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; flex-shrink: 0;
}
.msg.user .av { background: #6366f1; }
.msg.bot  .av { background: #1e293b; }
.bbl {
  padding: 9px 13px;
  border-radius: 14px;
  font-size: 13.5px;
  line-height: 1.7;
  white-space: pre-wrap;
  word-break: break-word;
}
.msg.user .bbl {
  background: #6366f1; color: #fff;
  border-radius: 14px 2px 14px 14px;
}
.msg.bot .bbl {
  background: #fff; color: #1e293b;
  border: 1.5px solid #e2e8f0;
  border-radius: 2px 14px 14px 14px;
}
.typing .bbl { color: #94a3b8; font-style: italic; }

/* ── Input bar ── */
.inbar {
  display: flex; gap: 8px; padding: 12px;
  background: #fff;
  border-top: 1.5px solid #e2e8f0;
}
#inp {
  flex: 1; padding: 9px 12px;
  border: 1.5px solid #cbd5e1;
  border-radius: 9px;
  font-size: 14px; font-family: inherit;
  resize: none; height: 44px; max-height: 120px;
}
#inp:focus { outline: none; border-color: #6366f1; }
#snd {
  background: #6366f1; color: #fff;
  border: none; border-radius: 9px;
  width: 44px; font-size: 18px;
  cursor: pointer; transition: background .15s;
}
#snd:hover:not(:disabled) { background: #4f46e5; }
#snd:disabled { opacity: .4; cursor: default; }
</style>
</head>
<body>
<div class="wrap">

  <!-- Header -->
  <div class="hdr">
    <div class="hdr-icon">🤖</div>
    <div>
      <div class="hdr-title">مساعد الذكاء الاصطناعي</div>
      <div class="hdr-sub">مدعوم بـ OpenRouter — نماذج مجانية متعددة</div>
    </div>
  </div>

  <!-- Key bar -->
  <div class="keybar">
    <input type="password" id="keyInp" placeholder="sk-or-v1-..." />
    <select id="modelSel">
      <option value="google/gemini-2.0-flash-exp:free">Gemini 2.0 Flash (مجاني)</option>
      <option value="meta-llama/llama-3.3-70b-instruct:free">Llama 3.3 70B (مجاني)</option>
      <option value="mistralai/mistral-7b-instruct:free">Mistral 7B (مجاني)</option>
      <option value="deepseek/deepseek-r1:free">DeepSeek R1 (مجاني)</option>
      <option value="qwen/qwen3-235b-a22b:free">Qwen 3 235B (مجاني)</option>
    </select>
    <button class="btn-save" onclick="saveKey()">حفظ</button>
    <span class="key-ok" id="keyOk"></span>
  </div>

  <!-- Messages -->
  <div class="msgs" id="msgs">
    <div class="msg bot">
      <div class="av">🤖</div>
      <div class="bbl">مرحباً! احصل على مفتاح مجاني من openrouter.ai ثم ابدأ المحادثة.</div>
    </div>
  </div>

  <!-- Input -->
  <div class="inbar">
    <textarea id="inp" placeholder="اكتب رسالتك... (Enter للإرسال)"
      onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();send();}"></textarea>
    <button id="snd" onclick="send()">➤</button>
  </div>

</div>
<script>
var hist = [];
var key  = localStorage.getItem('or_key') || '';
var mdl  = localStorage.getItem('or_model') || 'google/gemini-2.0-flash-exp:free';

// استعادة الإعدادات
if (key) {
  document.getElementById('keyInp').value = key;
  document.getElementById('keyOk').textContent = '✅ محفوظ';
}
document.getElementById('modelSel').value = mdl;

function saveKey() {
  key = document.getElementById('keyInp').value.trim();
  mdl = document.getElementById('modelSel').value;
  localStorage.setItem('or_key',   key);
  localStorage.setItem('or_model', mdl);
  document.getElementById('keyOk').textContent = '✅ تم';
}

// حفظ النموذج عند تغييره مباشرة
document.getElementById('modelSel').onchange = function() {
  mdl = this.value;
  localStorage.setItem('or_model', mdl);
};

async function send() {
  if (!key) { alert('أدخل مفتاح API أولاً'); return; }
  var inp  = document.getElementById('inp');
  var text = inp.value.trim();
  if (!text) return;
  inp.value = ''; inp.style.height = '44px';

  var box = document.getElementById('msgs');
  var btn = document.getElementById('snd');

  // رسالة المستخدم
  box.innerHTML += `<div class="msg user"><div class="av">👤</div><div class="bbl">${esc(text)}</div></div>`;

  // مؤشر الكتابة
  var tid = 't' + Date.now();
  box.innerHTML += `<div class="msg bot typing" id="${tid}"><div class="av">🤖</div><div class="bbl">⏳ جاري التفكير...</div></div>`;
  box.scrollTop = 9e9;
  btn.disabled = true;

  hist.push({ role: 'user', content: text });

  try {
    var r = await fetch('https://openrouter.ai/api/v1/chat/completions', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + key
      },
      body: JSON.stringify({
        model: mdl,
        messages: hist
      })
    });
    var d = await r.json();
    if (d.error) throw new Error(d.error.message);

    var reply = d.choices?.[0]?.message?.content || 'لا يوجد رد';
    hist.push({ role: 'assistant', content: reply });
    if (hist.length > 30) hist = hist.slice(-30);

    var el = document.getElementById(tid);
    if (el) { el.classList.remove('typing'); el.querySelector('.bbl').textContent = reply; }

  } catch(e) {
    var el = document.getElementById(tid);
    if (el) { el.classList.remove('typing'); el.querySelector('.bbl').textContent = '❌ ' + e.message; }
  }

  btn.disabled = false;
  box.scrollTop = 9e9;
}

function esc(t) { return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

document.getElementById('inp').addEventListener('input', function() {
  this.style.height = '44px';
  this.style.height = Math.min(this.scrollHeight, 120) + 'px';
});
</script>
</body>
</html>
